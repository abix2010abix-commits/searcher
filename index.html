<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة الدوال</title>
    <script src="https://unpkg.com/d3@3/d3.min.js"></script>
    <script src="https://unpkg.com/function-plot/dist/function-plot.js"></script>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: #f8f9fa;
        }
        .controls {
            width: 300px;
            background: #2c3e50;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        input {
            padding: 10px;
            border-radius: 4px;
            border: none;
            direction: ltr;
        }
        button {
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #plot-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
        }
    </style>
</head>
<body>

    <div class="controls">
        <h2>الرسم البياني</h2>
        <div class="input-group">
            <label>الدالة:</label>
            <input type="text" id="equation" value="x^2">
        </div>
        <div class="input-group">
            <label>اللون:</label>
            <input type="color" id="colorPicker" value="#3498db">
        </div>
        <button onclick="draw()">رسم</button>
    </div>

    <div id="plot-area">
        <div id="plot"></div>
    </div>

    <script>
        function draw() {
            const equation = document.getElementById('equation').value;
            const color = document.getElementById('colorPicker').value;
            try {
                functionPlot({
                    target: '#plot',
                    width: window.innerWidth - 320,
                    height: window.innerHeight - 20,
                    grid: true,
                    data: [{
                        fn: equation,
                        color: color
                    }]
                });
            } catch (err) {
                alert("خطأ في المعادلة");
            }
        }
        draw();
        window.addEventListener('resize', draw);
    </script>
</body>
</html>
